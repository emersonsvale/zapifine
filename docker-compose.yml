services:
  web-app:
    image: ghcr.io/emersonsvale/zapifine:latest
    pull_policy: always
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 3000
      NITRO_HOST: 0.0.0.0
      NITRO_PORT: 3000
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_KEY: ${SUPABASE_KEY}
      SUPABASE_GW_SECRET: ${SUPABASE_GW_SECRET}
      META_APP_ID: ${META_APP_ID}
      META_APP_SECRET: ${META_APP_SECRET}
      META_CONFIG_ID: ${META_CONFIG_ID}
      META_GRAPH_VERSION: ${META_GRAPH_VERSION}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI}
      GOOGLE_OAUTH_STATE_SECRET: ${GOOGLE_OAUTH_STATE_SECRET}
      EVO_API_URL: ${EVO_API_URL}
      EVO_GLOBAL_API_KEY: ${EVO_GLOBAL_API_KEY}
      WHATS_API_URL: ${WHATS_API_URL}
      WHATS_API_INTERNAL_URL: ${WHATS_API_INTERNAL_URL}
      WHATS_API_INTERNAL_SECRET: ${WHATS_API_INTERNAL_SECRET}
      CRON_SECRET: ${CRON_SECRET}
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY}
      VAPID_SUBJECT: ${VAPID_SUBJECT}
